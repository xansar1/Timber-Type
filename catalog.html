<div class="menu-overlay"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ===== CATALOG =====
  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");

  const sections = document.querySelectorAll(".catalog-section");
  const tabs = document.querySelectorAll(".catalog-tabs a");

  let activeType = type;
  if (!activeType || !document.getElementById(activeType)) {
    activeType = "room";
  }

  sections.forEach(section => section.classList.remove("active"));

  const activeSection = document.getElementById(activeType);
  if (activeSection) {
    activeSection.classList.add("active");
  }

  tabs.forEach(link => {
    const urlType = new URL(link.href).searchParams.get("type");
    link.classList.toggle("active", urlType === activeType);
  });

  // ===== WHATSAPP =====
  document.querySelectorAll(".card").forEach(card => {

    const img = card.querySelector("img");
    if (!img) return;

    img.style.cursor = "pointer";

    img.addEventListener("click", () => {

      const name = img.dataset.name || "this design";

      const imageUrl = window.location.origin + "/" + img.getAttribute("src");

      const message = `Hi, I liked this design: 
      ${imageUrl}
      
      I want a this same design for my shop. Can you create it for me?`;

      const url = `https://wa.me/918157868804?text=${encodeURIComponent(message)}`;

      window.location.href = url;

    });

  });

  // ===== MENU =====
  const toggle = document.getElementById("menu-toggle");
  const nav = document.querySelector(".nav-links");
  const overlay = document.querySelector(".menu-overlay");

  if (toggle && nav && overlay) {
    toggle.addEventListener("click", () => {
      nav.classList.toggle("active");
      overlay.classList.toggle("active");
      toggle.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
      nav.classList.remove("active");
      overlay.classList.remove("active");
      toggle.classList.remove("active");
    });
  }

});

// ===== LOADER =====
window.addEventListener("load", () => {
  const loader = document.querySelector(".loader");
  setTimeout(() => loader.classList.add("hide"), 1200);
});
</script>
