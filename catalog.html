<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");

  // ACTIVE TAB (FIXED)
document.querySelectorAll(".catalog-tabs a").forEach(link => {
  const urlType = new URL(link.href).searchParams.get("type");

  if (urlType === type) {
    link.classList.add("active");
  }
});

  const sections = document.querySelectorAll(".catalog-section");

  // HIDE ALL FIRST (important)
  sections.forEach(section => {
    section.style.display = "none";
  });

  // SHOW SELECTED
  if(type && document.getElementById(type)){
    const activeSection = document.getElementById(type);
    activeSection.style.display = "block";

  activeSection.scrollIntoView({
    behavior: "smooth",
    block: "start"
  });

  } else {
    // fallback → show all
    sections.forEach(section => {
      section.style.display = "block";
    });
  }

  // WHATSAPP CLICK
  document.querySelectorAll(".card img").forEach(img => {
    img.style.cursor = "pointer";

    img.addEventListener("click", () => {
      const name = img.dataset.name;

      const confirmAction = confirm(`View "${name}" and contact on WhatsApp?`);

      if(confirmAction){
        window.open(`https://wa.me/918157868804?text=${encodeURIComponent("Hi, I'm interested in " + name)}`);
      }
    });
  });

});


</script>

<script>
window.addEventListener("load", () => {
  const loader = document.querySelector(".loader");

  setTimeout(() => {
    loader.classList.add("hide");
  }, 1500); // match animation time
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const toggle = document.getElementById("menu-toggle");
  const nav = document.querySelector(".nav-links");
  const overlay = document.querySelector(".menu-overlay");

  if (!toggle || !nav || !overlay) return; // 🔥 safety

  toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
    toggle.classList.toggle("active");
    overlay.classList.toggle("active");
  });

  overlay.addEventListener("click", () => {
    nav.classList.remove("active");
    toggle.classList.remove("active");
    overlay.classList.remove("active");
  });

  document.addEventListener("click", (e) => {
    if (!nav.contains(e.target) && !toggle.contains(e.target)) {
      nav.classList.remove("active");
      toggle.classList.remove("active");
      overlay.classList.remove("active");
    }
  });

});
</script>
